services:
  shoppingbackend:
    build:
      context: ./ShoppingBackend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/shoppingSystemDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=mysecretpassword
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=shoppingSystemDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoppingSystemDB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  shoppingfrontend:
    build:
      context: ./ShoppingFrontend
      dockerfile: Dockerfile
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://shoppingbackend:8080/api
    volumes:
      - ./ShoppingFrontend/src:/app/src 
      - ./ShoppingFrontend/public:/app/public
    restart: unless-stopped
    init: true
    networks:
      - app_network

volumes:
  db-data:

networks:
  app_network:
    driver: bridge

